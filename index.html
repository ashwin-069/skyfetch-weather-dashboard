<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkyFetch Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <div class="container">
    <h1>🌤 SkyFetch Weather Dashboard</h1>

    <!-- Search Section -->
    <div class="search-section">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Enter city name..."
      >
      <button id="searchBtn">Search</button>
    </div>

    <!-- Weather Display -->
    <div id="weatherDisplay" class="weather-display">
      <p>Enter a city to see the weather 🌍</p>
    </div>

  </div>
  <div id="weatherDisplay" class="weather-display"></div>

<div id="forecastContainer" class="forecast-container"></div>

  <script src="app.js" defer></script>
</body>
</html>
